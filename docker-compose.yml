version: "3.8"
services:
  app:
    build: .
    container_name: spinaisql-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:422Fleming422Fleming422@db:5432/mydb}
      STORAGE_ROOT: /app/uploads
      PUBLIC_ASSET_PATH: /assets
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

  db:
    image: postgres:15
    container_name: spinaisql-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-422Fleming422Fleming422}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data

  cloudflared:
    image: cloudflare/cloudflared:2026.4.1
    container_name: spinaisql-cloudflared
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_METRICS: 0.0.0.0:2000

volumes:
  dbdata:
  backend_uploads:
